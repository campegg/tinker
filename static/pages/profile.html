<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{display_name}} — {{domain}}</title>
        <meta name="description" content="{{display_name}} on {{domain}}" />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html {
                font-size: 16px;
                -webkit-text-size-adjust: 100%;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue",
                    Arial, sans-serif;
                background-color: oklch(11.35% 0.079 264.2);
                min-block-size: 100dvh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem 1rem;
            }

            main {
                inline-size: 100%;
                max-inline-size: 430px;
            }

            /* ---- card ---- */

            .profile-card {
                background: #ffffff;
                border-radius: 12px;
                overflow: hidden;
            }

            /* ---- header banner ---- */

            .profile-header {
                background-color: oklch(90% 0.006 264);
                block-size: 160px;
                position: relative;
            }

            /* avatar sits on the header/content boundary */
            .avatar-wrap {
                position: absolute;
                inset-block-end: -44px; /* half of 88px avatar */
                inset-inline-start: 28px;
            }

            .avatar,
            .avatar-placeholder {
                inline-size: 88px;
                block-size: 88px;
                border-radius: 50%;
                border: 3px solid #ffffff;
                background-color: oklch(78% 0.01 264);
                display: block;
            }

            .avatar {
                object-fit: cover;
            }

            .avatar-placeholder {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .avatar-placeholder svg {
                inline-size: 38px;
                block-size: 38px;
                fill: oklch(58% 0.015 264);
            }

            /* ---- content ---- */

            .profile-content {
                /* 44px avatar overlap + 16px breathing room */
                padding: 60px 28px 28px;
            }

            .display-name {
                font-size: 1.5rem;
                font-weight: 700;
                line-height: 1.2;
                color: #111827;
                margin-block-end: 0.3rem;
            }

            .handle {
                font-size: 0.9rem;
                color: #6b7280;
                margin-block-end: 1.25rem;
                word-break: break-all;
            }

            .bio {
                font-size: 1rem;
                line-height: 1.6;
                color: #374151;
                margin-block-end: 1.75rem;
            }

            .bio p {
                margin-block-end: 0.65rem;

                &:last-child {
                    margin-block-end: 0;
                }
            }

            /* ---- follow button ---- */

            .follow-btn {
                display: block;
                inline-size: fit-content;
                margin-inline: auto;
                padding: 0.6rem 2.25rem;
                background: #ffffff;
                border: 1.5px solid #374151;
                border-radius: 6px;
                font-family: inherit;
                font-size: 0.75rem;
                font-weight: 600;
                color: #374151;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                text-decoration: none;
                transition:
                    background-color 0.15s ease,
                    border-color 0.15s ease,
                    color 0.15s ease;

                &:hover {
                    background-color: #f9fafb;
                    border-color: #111827;
                    color: #111827;
                }

                &:focus-visible {
                    outline: 2px solid #111827;
                    outline-offset: 2px;
                }
            }

            /* ---- links ---- */

            .links {
                list-style: none;
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
                border-block-start: 1px solid #e5e7eb;
                padding-block-start: 1.25rem;
                margin-block-start: 1.75rem;

                li {
                    display: flex;
                    align-items: center;
                    gap: 0.5rem;

                    &::before {
                        content: "→";
                        color: #9ca3af;
                        font-size: 0.875rem;
                        flex-shrink: 0;
                    }
                }

                a {
                    font-size: 0.9rem;
                    color: #2563eb;
                    text-decoration: none;
                    word-break: break-all;

                    &:hover {
                        text-decoration: underline;
                    }
                }
            }
        </style>
    </head>
    <body>
        <main>
            <article class="profile-card">
                <div class="profile-header">
                    <div class="avatar-wrap" id="avatar-wrap">
                        <img
                            class="avatar"
                            src="{{avatar_url}}"
                            alt="{{display_name}}"
                            width="88"
                            height="88"
                            id="avatar-img"
                        />
                    </div>
                </div>

                <div class="profile-content">
                    <h1 class="display-name">{{display_name}}</h1>
                    <p class="handle">{{handle}}</p>
                    <div class="bio">{{bio}}</div>
                    <a class="follow-btn" href="{{actor_uri}}">Follow Me</a>
                    <ul class="links" id="links-list">
                        {{links}}
                    </ul>
                </div>
            </article>
        </main>

        <script>
            (function () {
                "use strict";

                // Replace missing/empty avatar with a silhouette placeholder.
                var img = document.getElementById("avatar-img");
                var wrap = document.getElementById("avatar-wrap");
                if (img && wrap) {
                    var src = img.getAttribute("src");
                    var missing = !src || src === "{{avatar_url}}";
                    var showPlaceholder = function () {
                        wrap.innerHTML =
                            '<span class="avatar-placeholder" role="img" aria-label="No avatar">' +
                            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">' +
                            '<path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2' +
                            " 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4" +
                            'c0-3.2-6.4-4.8-9.6-4.8z"/>' +
                            "</svg></span>";
                    };
                    if (missing) {
                        showPlaceholder();
                    } else {
                        img.onerror = showPlaceholder;
                    }
                }

                // Hide the links list when there are no items.
                var links = document.getElementById("links-list");
                if (links && links.children.length === 0) {
                    links.style.display = "none";
                }
            })();
        </script>
    </body>
</html>
