<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}{% endblock %} — Tinker</title>
        <link rel="stylesheet" href="/assets/css/styles.css" />
    </head>
    <body class="admin-page">
        <script nonce="{{ csp_nonce }}">
            window.__TINKER__ = { csrf: "{{ csrf_token }}" };
        </script>

        <nav-bar
            active="{{ nav_active }}"
            user-name="{{ user_name }}"
            user-handle="{{ user_handle }}"
            user-avatar="{{ user_avatar }}"
        ></nav-bar>

        <main class="admin-content">{% block main %}{% endblock %}</main>

        {# Foundation scripts — present on every admin page. #}
        <script type="module" src="/assets/js/components/actor-identity.js"></script>
        <script type="module" src="/assets/js/components/nav-bar.js"></script>
        <script type="module" src="/assets/js/components/notification-badge.js"></script>
        {% block scripts %}{% endblock %}
    </body>
</html>
